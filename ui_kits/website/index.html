<body>
  <div id="root"></div>
  <script type="text/babel" src="Icon.jsx"></script>

  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel">
    function App() {
      const [active, setActive] = React.useState('accueil');
      const onNavigate = (id, behavior = 'smooth') => {
        setActive(id);
        const el = document.getElementById(id);
        if (el) {
          window.scrollTo({ top: el.offsetTop - 60, behavior });
        }
      };
      React.useEffect(() => {
        const ids = ['accueil', 'services', 'equipements', 'realisations', 'zone', 'contact'];
        if ('scrollRestoration' in window.history) {
          window.history.scrollRestoration = 'manual';
        }
        const initialHash = window.location.hash?.replace('#', '');
        if (initialHash && ids.includes(initialHash)) {
          window.setTimeout(() => {
            onNavigate(initialHash, 'auto');
            window.history.replaceState(null, '', window.location.pathname + window.location.search);
          }, 80);
        } else {
          window.setTimeout(() => window.scrollTo({ top: 0, behavior: 'auto' }), 0);
        }
        const onScroll = () => {
          const current = ids
            .map(id => ({ id, top: document.getElementById(id)?.getBoundingClientRect().top ?? Infinity }))
            .filter(item => item.top < 160)
            .sort((a, b) => b.top - a.top)[0];
          if (current) setActive(current.id);
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return (
        <>
          <Header active={active} onNavigate={onNavigate} />
          <main>
            <Hero onCta={onNavigate} />
            <PartnersStrip />
            <PromoMarquee />
            <PromoProducts />
            <ProductCatalogTeaser />
            <Services />
            <ProcessBand />
            <Equipment />
            <About />
            <Realisations />
            <Zone />
            <FAQ />
            <Contact />
          </main>
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
