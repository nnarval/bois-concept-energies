<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);min-height:150px;display:flex;align-items:center;gap:32px}
  .a,.b,.c{display:flex;flex-direction:column;align-items:center;gap:10px}
  .b{background:var(--anthracite);padding:18px 28px;border-radius:var(--radius-md)}
  .meta{font-size:11px;color:var(--ash);letter-spacing:.16em;text-transform:uppercase;font-weight:600;font-family:var(--font-body)}
  .b .meta{color:var(--stone)}
</style></head><body>
  <div class="a"><img src="../assets/logo/bce-logo-transparent.png" height="120" alt=""><span class="meta">Sur cream</span></div>
  <div class="b"><img src="../assets/logo/bce-logo-knockout.png" height="120" alt=""><span class="meta">Sur ink — knockout cream + leaf</span></div>
</body></html>
