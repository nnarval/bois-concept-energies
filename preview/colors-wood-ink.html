<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Wood &amp; Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);min-height:150px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
  .sw{height:120px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px;color:#FBF7F1}
  .hex{font-family:var(--font-mono);font-size:11px;color:#DCD0BC;margin-top:2px}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#3C2A1E"><div class="name">Walnut</div><div class="hex">#3C2A1E</div></div>
    <div class="sw" style="background:#2A1D14"><div class="name">Walnut 2</div><div class="hex">#2A1D14</div></div>
    <div class="sw" style="background:#7A5A3F"><div class="name">Oak</div><div class="hex">#7A5A3F</div></div>
    <div class="sw" style="background:#1C1A17"><div class="name">Ink</div><div class="hex">#1C1A17</div></div>
    <div class="sw" style="background:#2E2C28"><div class="name">Anthracite</div><div class="hex">#2E2C28</div></div>
  </div>
</body></html>
