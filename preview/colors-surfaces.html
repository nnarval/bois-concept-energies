<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#EDE6D6;min-height:150px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{height:120px;border-radius:var(--radius-md);border:var(--border-hair);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--ink)}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ash);margin-top:2px}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#F5F1EA"><div class="name">Bg</div><div class="hex">#F5F1EA</div></div>
    <div class="sw" style="background:#FBF8F2"><div class="name">Surface</div><div class="hex">#FBF8F2</div></div>
    <div class="sw" style="background:#E8E2D4"><div class="name">Sand</div><div class="hex">#E8E2D4</div></div>
    <div class="sw" style="background:#C9C2B3"><div class="name">Stone</div><div class="hex">#C9C2B3</div></div>
  </div>
</body></html>
