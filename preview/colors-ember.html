<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Ember</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);min-height:150px}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .sw{height:120px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px;color:#FBF7F1}
  .hex{font-family:var(--font-mono);font-size:11px;color:#FBF7F1;opacity:.7;margin-top:2px}
  .note{margin-top:14px;font-size:13px;color:var(--oak);font-family:var(--font-body)}
  .note b{color:var(--ink)}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#B5683A"><div class="name">Copper</div><div class="hex">#B5683A · primary accent</div></div>
    <div class="sw" style="background:#9A562E"><div class="name">Copper 2</div><div class="hex">#9A562E · hover</div></div>
    <div class="sw" style="background:#D9531E"><div class="name">Ember</div><div class="hex">#D9531E · sparing</div></div>
  </div>
  <p class="note"><b>Règle:</b> max 2 utilisations d'accent par écran. Ember reservé aux flammes &amp; focus rings.</p>
</body></html>
