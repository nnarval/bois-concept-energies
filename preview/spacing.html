<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 32px;background:var(--bg);min-height:150px;display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:16px}
  .tk{font-family:var(--font-mono);font-size:11px;color:var(--oak);width:90px}
  .bar{height:14px;background:var(--copper);border-radius:2px}
</style></head><body>
  <div class="row"><span class="tk">--space-1 4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tk">--space-2 8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tk">--space-3 12</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tk">--space-4 16</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tk">--space-5 24</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tk">--space-6 32</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tk">--space-7 48</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tk">--space-8 64</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tk">--space-9 96</span><div class="bar" style="width:96px"></div></div>
  <div class="row"><span class="tk">--space-10 128</span><div class="bar" style="width:128px"></div></div>
</body></html>
