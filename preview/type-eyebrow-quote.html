<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Eyebrow & caption</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg);min-height:150px;display:flex;flex-direction:column;gap:18px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ash)}
  .quote-row{display:flex;align-items:flex-start;gap:18px;border-left:2px solid var(--copper);padding-left:18px}
</style></head><body>
  <div>
    <span class="eyebrow">Notre savoir-faire</span>
    <p class="meta" style="margin:6px 0 0">.eyebrow · Manrope 600 · 12px · 0.16em tracking · uppercase · copper</p>
  </div>
  <div class="quote-row">
    <span class="quote">Un travail propre, un installateur qui prend le temps d'expliquer.</span>
  </div>
  <p class="meta" style="margin:0">.quote · Marcellus 400 · clamp(22–36px)</p>
</body></html>
