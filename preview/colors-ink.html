<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Ink scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);min-height:150px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{height:120px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:14px;color:#FBF8F2}
  .name{font-family:var(--font-body);font-weight:600;font-size:13px}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;opacity:.75;margin-top:2px}
  .sw.lt{color:#141414;border:var(--border-hair)}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#141414"><div class="name">Ink</div><div class="hex">#141414</div></div>
    <div class="sw" style="background:#1F1F1F"><div class="name">Anthracite</div><div class="hex">#1F1F1F</div></div>
    <div class="sw lt" style="background:#5A5A5A;color:#FBF8F2"><div class="name">Ash</div><div class="hex">#5A5A5A</div></div>
    <div class="sw lt" style="background:#8A8A85;color:#FBF8F2"><div class="name">Smoke</div><div class="hex">#8A8A85</div></div>
  </div>
</body></html>
