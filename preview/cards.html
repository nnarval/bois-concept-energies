<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg);min-height:150px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{background:var(--surface);border:var(--border-hair);border-radius:var(--radius-md);padding:24px;box-shadow:var(--shadow-1);transition:box-shadow var(--dur-base) var(--ease)}
  .card:hover{box-shadow:var(--shadow-2)}
  .ic{width:28px;height:28px;color:var(--ink);margin-bottom:14px}
  h4{margin:0 0 6px}
  .meta{font-size:13px;color:var(--leaf);margin-top:14px;font-weight:600}
</style></head><body>
  <div class="card">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
    <h4>Pose &amp; installation</h4>
    <p style="margin:0;font-size:15px;color:var(--fg-2)">Visite préalable, raccordement aux normes, mise en service. Travail propre, garanti.</p>
    <div class="meta">En savoir plus →</div>
  </div>
  <div class="card">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    <h4>Entretien &amp; ramonage</h4>
    <p style="margin:0;font-size:15px;color:var(--fg-2)">Contrat annuel ou intervention ponctuelle. Certificat fourni pour l'assurance.</p>
    <div class="meta">En savoir plus →</div>
  </div>
</body></html>
