<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg);min-height:150px;display:flex;align-items:flex-end;gap:28px}
  .b{width:80px;height:80px;background:var(--surface);border:var(--border-hair)}
  .lab{font-family:var(--font-mono);font-size:11px;color:var(--oak);margin-top:8px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head><body>
  <div class="col"><div class="b" style="border-radius:2px"></div><div class="lab">xs · 2</div></div>
  <div class="col"><div class="b" style="border-radius:4px"></div><div class="lab">sm · 4</div></div>
  <div class="col"><div class="b" style="border-radius:8px"></div><div class="lab">md · 8</div></div>
  <div class="col"><div class="b" style="border-radius:14px"></div><div class="lab">lg · 14</div></div>
  <div class="col"><div class="b" style="border-radius:999px;width:120px;height:32px"></div><div class="lab">pill (tags only)</div></div>
</body></html>
