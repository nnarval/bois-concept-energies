<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Wordmark on photo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;min-height:150px;position:relative;overflow:hidden}
  img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .ov{position:relative;padding:24px 32px;display:flex;align-items:center;justify-content:space-between;color:var(--bg)}
  .meta{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#FBF8F2;opacity:.85;letter-spacing:.16em;text-transform:uppercase}
</style></head><body>
  <img class="bg" src="../assets/photography/poele-bois-vert-fonce.png" alt="">
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,20,20,.55),rgba(20,20,20,.25))"></div>
  <div class="ov" style="height:200px">
    <img src="../assets/logo/bce-logo-knockout.png" height="120" alt="">
    <span class="meta">Logo en blanc sur photo</span>
  </div>
</body></html>
