<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:32px;background:var(--bg);min-height:150px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-pill);font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.04em}
  .t-default{background:var(--sand);color:var(--ink)}
  .t-leaf{background:transparent;color:var(--leaf);border:1px solid var(--leaf)}
  .t-ink{background:var(--ink);color:var(--bg)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
</style></head><body>
  <span class="tag t-default">Granulés</span>
  <span class="tag t-default">Bois</span>
  <span class="tag t-default">Insert</span>
  <span class="tag t-leaf"><span class="dot"></span>Certifié RGE</span>
  <span class="tag t-ink">Tarn-et-Garonne</span>
</body></html>
